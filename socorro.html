<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brat imc</title>

    <style>
        /* 🧹 O asterisco (*) seleciona absolutamente TODOS os elementos para limpar os padrões */
        * {
            margin: 0;
            /* 📐 Zera a margem externa padrão de todos os elementos */
            padding: 0;
            /* 📏 Zera o espaçamento interno padrão de todos os elementos */
            box-sizing: border-box;
            /* 📦 Faz com que bordas e paddings não aumentem o tamanho total do bloco */
            /* 🔠 Define as fontes do projeto puxando o visual mais seco e condensado do álbum */
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-transform: lowercase;
            /* 🔤 Força todo o texto a ficar em letras minúsculas (puro estilo BRAT) */
        }

        /* 🖤 Estilização do corpo (tela inteira do navegador) */
        body {
            background-color: #000000;
            /* 🕶️ Define o fundo como totalmente preto */
            color: #21fd0d;
            /* 🍏 Define a cor do texto com o verde limão ácido icônico */
            display: flex;
            /* 🧩 Ativa o sistema Flexbox para alinhar elementos facilmente */
            justify-content: center;
            /* ↔️ Centraliza o bloco da calculadora na horizontal */
            align-items: center;
            /* ↕️ Centraliza o bloco da calculadora na vertical */
            min-height: 100vh;
            /* 📏 Garante que o fundo ocupe 100% da altura da tela visível */
            padding: 2rem;
            /* 🔲 Adiciona um espaçamento de segurança nas bordas da tela */
        }

        /* 📦 Caixa principal que guarda a calculadora (minimalista e sem firulas) */
        .brat-box {
            width: 100%;
            /* 🌐 Ocupa toda a largura disponível em telas pequenas */
            max-width: 500px;
            /* 🛑 Limita o tamanho máximo em 500px para não esticar em monitores grandes */
            text-align: center;
            /* 🎯 Centraliza todos os textos que estiverem dentro dela */
        }

        /* 🎤 Estilização do título principal inspirado na capa do álbum da Charli XCX */
        h1 {
            font-size: 4.5rem;
            /* 📢 Deixa o texto gigante e impactante */
            font-weight: bold;
            /* 💪 Deixa a fonte bem grossa e marcante */
            letter-spacing: -2px;
            /* 🗜️ Espreme as letras para ficarem coladas, imitando o álbum */
            margin-bottom: 3rem;
            /* 📐 Cria um espaço grande entre o título e os campos abaixo */
            /* 🟢 Cria uma sombra verde borrada por trás do texto, dando um aspecto digital e ácido */
            text-shadow: 0 0 5px rgba(14, 206, 0, 0.5);
        }

        /* 🧱 Bloco que agrupa a legenda e a caixa de digitação */
        .input-group {
            margin-bottom: 2rem;
            /* ↕️ Afasta um bloco de input do outro */
            text-align: left;
            /* ⬅️ Alinha os textos dos inputs para a esquerda */
        }

        /* 🏷️ Estilização das legendas dos campos */
        label {
            display: block;
            /* 🛠️ Transforma em bloco para pular linha e ficar acima do input */
            font-size: 1.2rem;
            /* 📏 Define um tamanho de texto confortável */
            margin-bottom: 0.5rem;
            /* 📐 Dá um pequeno espaço entre a legenda e a caixa de texto */
            font-weight: bold;
            /* 🏋️ Deixa o texto da legenda em negrito */
        }

        /* ⌨️ Estilização das caixas onde o usuário digita os dados */
        input {
            width: 100%;
            /* 📐 Faz a caixa ocupar toda a largura do seu bloco pai */
            padding: 1rem;
            /* 🔲 Dá um espaço interno para o texto não ficar colado na borda */
            background-color: #000000;
            /* 🖤 Mantém o fundo da caixinha preto */
            border: 2px solid #21fd0d;
            /* 🟢 Cria uma borda sólida com o verde do BRAT */
            color: #21fd0d;
            /* ✍️ Define que o número digitado também será verde limão */
            font-size: 1.5rem;
            /* 🔍 Aumenta o tamanho dos números digitados */
            outline: none;
            /* 🚫 Remove aquela borda padrão chata que o navegador cria ao clicar */
        }

        /* ⚡ Botão principal de calcular (estilo bloco de contraste) */
        button {
            width: 100%;
            /* 📐 Faz o botão ocupar a largura total disponível */
            padding: 1rem;
            /* 🔲 Dá um bom espaçamento interno para o botão ficar alto */
            background-color: #21fd0d;
            /* 🟢 Inverte o padrão: fundo totalmente verde ácido */
            color: #000000;
            /* 🖤 Texto do botão em preto para dar contraste máximo */
            border: none;
            /* 🚫 Remove qualquer borda padrão do sistema */
            font-size: 1.5rem;
            /* 🔍 Deixa o texto do botão bem grande e visível */
            font-weight: bold;
            /* 💪 Destaca o texto em negrito */
            cursor: pointer;
            /* 🫵 Transforma a seta do mouse na mãozinha de clique */
            margin-bottom: 2rem;
            /* 📐 Cria um espaço abaixo do botão */
            transition: opacity 0.1s;
            /* ⏱️ Define uma transição de opacidade ultra rápida */
        }

        /* 🖱️ Efeito visual ao passar o mouse por cima do botão principal */
        button:hover {
            opacity: 0.8;
            /* 🕶️ Deixa o botão ligeiramente transparente ao passar o mouse */
        }

        /* 🗑️ Estilização específica do botão de limpar o histórico */
        .btn-clear {
            background-color: transparent;
            /* 🚫 Fundo invisível para não chamar tanta atenção */
            border: 2px solid #21fd0d;
            /* 🟢 Borda verde para manter a identidade */
            color: #21fd0d;
            /* 🟢 Texto em verde */
            margin-top: 1rem;
            /* 📐 Dá um espaço acima dele se separando da lista */
            font-size: 1rem;
            /* 📏 Tamanho menor e mais discreto */
            padding: 0.5rem;
            /* 🔲 Espaçamento interno reduzido */
        }

        /* 🖱️ Efeito visual ao passar o mouse no botão de limpar */
        .btn-clear:hover {
            background-color: #19c909;
            /* 🟢 Muda o fundo para um verde um pouco mais escuro */
            color: #000000;
            /* 🖤 Altera a cor do texto para preto ao entrar em foco */
        }

        /* 📊 Caixa de exibição do resultado do IMC */
        .result-container {
            border: 2px dashed #21fd0d;
            /* ✂️ Cria uma borda pontilhada estilosa em verde */
            padding: 2rem;
            /* 🔲 Espaçamento interno generoso para os dados respirarem */
            margin-top: 2rem;
            /* 📐 Afasta a caixa de resultado dos elementos de cima */
            display: none;
            /* 🚫 Começa escondida por padrão, só aparece após o clique */
        }

        /* 🔢 Estilização do número do IMC calculado */
        .result-value {
            font-size: 2.5rem;
            /* 📢 Número bem gigante para chamar a atenção */
            font-weight: bold;
            /* 💪 Em negrito destacado */
            margin-bottom: 0.5rem;
            /* 📐 Espaço entre o número e o texto do status */
        }

        /* 📑 Estilização do texto do status (ex: "peso normal") */
        .result-text {
            font-size: 1.5rem;
            /* 📏 Tamanho médio-grande */
            margin-bottom: 1rem;
            /* 📐 Espaço antes do conselho com emoji */
        }

        /* 💡 Estilização da frase de conselho de saúde */
        .result-advice {
            font-size: 1.2rem;
            /* 📏 Tamanho de leitura confortável */
            font-style: italic;
            /* ✍️ Texto em itálico para dar um charme diferenciado */
        }

        /* 📜 Seção que organiza o histórico de resultados guardados */
        .history-container {
            margin-top: 3rem;
            /* 📐 Afasta consideravelmente o histórico da área de cálculo */
            text-align: left;
            /* ⬅️ Alinha os itens salvos para a esquerda */
            border-top: 1px solid #21fd0d;
            /* ➖ Cria uma linha fina verde para separar as seções */
            padding-top: 1.5rem;
            /* 📐 Espaço interno logo abaixo da linha separadora */
        }

        /* 📌 Título da seção de histórico */
        .history-title {
            font-size: 1.3rem;
            /* 📏 Tamanho em destaque */
            margin-bottom: 1rem;
            /* 📐 Espaço entre o título e a lista de itens */
            font-weight: bold;
            /* 💪 Título em negrito */
        }

        /* 📋 Estilização da lista (ul) que vai segurar os itens do histórico */
        .history-list {
            list-style: none;
            /* 🚫 Remove aquelas bolinhas padrão de listas */
        }

        /* 🧾 Estilização de cada linha de registro do histórico (li) */
        .history-item {
            font-size: 1rem;
            /* 📏 Tamanho de texto padrão */
            padding: 0.5rem 0;
            /* 📐 Espaçamento em cima e embaixo de cada item */
            border-bottom: 1px dashed rgba(138, 206, 0, 0.3);
            /* ✂️ Linha pontilhada sutil entre um item e outro */
            display: flex;
            /* 🧩 Flexbox para separar a data do status */
            justify-content: space-between;
            /* ↔️ Joga a data para a esquerda e o status para a direita */
        }
    </style>
</head>

<body>

    <div class="brat-box">
        <h1>brat imc</h1>

        <div class="input-group">
            <label for="weight">insira seu peso (kg):</label>
            <input type="number" id="weight" step="0.1" placeholder="00.0">
        </div>

        <div class="input-group">
            <label for="height">insira sua altura (m):</label>
            <input type="number" id="height" step="0.01" placeholder="0.00">
        </div>

        <button onclick="calculateIMC()">calcular imc</button>

        <div id="resultBox" class="result-container">
            <div id="imcValue" class="result-value"></div>
            <div id="imcText" class="result-text"></div>
            <div id="imcAdvice" class="result-advice"></div>
        </div>

        <div class="history-container">
            <div class="history-title">histórico de picos:</div>
            <ul id="historyList" class="history-list"></ul>
            <button class="btn-clear" onclick="clearHistory()">limpar histórico</button>
        </div>
    </div>

    <script>
        // 📥 Evento que escuta quando a página carregou 100% para carregar o histórico salvo
        document.addEventListener("DOMContentLoaded", loadHistory);

        // 🧮 Função principal disparada ao clicar no botão "calcular imc"
        function calculateIMC() {
            // 📥 Captura o valor do peso digitado e converte para número flutuante (decimal)
            const weight = parseFloat(document.getElementById('weight').value);
            // 📥 Captura o valor da altura digitada e converte para número flutuante (decimal)
            const height = parseFloat(document.getElementById('height').value);

            // 🎯 Guarda referências das caixas de texto do HTML para manipulação
            const resultBox = document.getElementById('resultBox');
            const imcValue = document.getElementById('imcValue');
            const imcText = document.getElementById('imcText');
            const imcAdvice = document.getElementById('imcAdvice');

            // 🚫 Validação de segurança: confere se os campos estão em branco, zerados ou negativos
            if (!weight || !height || weight <= 0 || height <= 0) {
                alert('insira valores reais, por favor.'); /* ⚠️ Emite um aviso na tela caso os dados estejam errados */
                return; /* 🛑 Aborta a execução da função imediatamente */
            }

            // 📐 Executa a fórmula matemática oficial: Peso dividido por (Altura vezes Altura)
            // 🛠️ O .toFixed(1) arredonda o resultado final para mostrar apenas uma casa após a vírgula
            const imc = (weight / (height * height)).toFixed(1);

            // 📝 Cria variáveis vazias para preencher de acordo com a situação de saúde do usuário
            let classification = '';
            let advice = '';

            // 🚦 Estrutura de decisões lógicas baseada nas tabelas oficiais de IMC
            if (imc < 18.5) {
                classification = 'abaixo do peso';
                advice = '🥗 foque na sua saúde e busque uma nutrição fortalecida.';
            } else if (imc >= 18.5 && imc < 25) {
                classification = 'peso normal';
                advice = '🔋 tudo certo. mantenha o ritmo e cuide do corpo.';
            } else if (imc >= 25 && imc < 30) {
                classification = 'sobrepeso';
                advice = '🏃 de olho na rotina. movimentar-se faz bem para o coração.';
            } else {
                classification = 'obesidade';
                advice = '🩺 atenção redobrada. consulte profissionais para te apoiar.';
            }

            // ✍️ Escreve dinamicamente o número do IMC calculado na tela
            imcValue.textContent = `imc: ${imc}`;
            // ✍️ Escreve o diagnóstico do status do usuário
            imcText.textContent = `status: ${classification}`;
            // ✍️ Escreve a frase personalizada com o emoji correspondente
            imcAdvice.textContent = advice;

            // 👁️ Altera a propriedade de display para 'block', tornando a caixa pontilhada visível na tela
            resultBox.style.display = 'block';

            // 💾 Envia o valor do IMC e o status para serem arquivados na função de histórico
            saveToHistory(imc, classification);
        }

        // 💾 Função responsável por salvar as consultas dentro da memória local do navegador (localStorage)
        function saveToHistory(imc, classification) {
            // 📥 Tenta ler o histórico existente. Se não achar nada, inicializa um array (lista) vazio []
            let history = JSON.parse(localStorage.getItem('brat_imc_history')) || [];

            // 📦 Cria um objeto estruturado contendo as informações da medição atual
            const newItem = {
                imc: imc, // 🔢 O valor numérico do IMC
                status: classification, // 📑 A classificação textual
                date: new Date().toLocaleDateString('pt-BR') // 📅 A data de hoje formatada no padrão brasileiro
            };

            // 🔀 Insere o novo item na primeiríssima posição da lista (para o mais recente ficar no topo)
            history.unshift(newItem);

            // 🛑 Regra de corte: se a lista passar de 5 registros, apaga o mais antigo (.pop() remove o último)
            if (history.length > 5) history.pop();

            // 💾 Converte a lista atualizada para texto puro (JSON) e guarda na caixinha de memórias do navegador
            localStorage.setItem('brat_imc_history', JSON.stringify(history));

            // 🔄 Repassa a lista atualizada para que seja desenhada na tela
            renderHistory(history);
        }

        // 📂 Função que recupera os dados salvos quando a página inicia ou é recarregada
        function loadHistory() {
            // 📥 Puxa os dados em formato de texto e transforma de volta em array de objetos do JS
            let history = JSON.parse(localStorage.getItem('brat_imc_history')) || [];
            // 🔄 Manda desenhar a lista recuperada
            renderHistory(history);
        }

        // 🛠️ Função puramente visual responsável por transformar os dados em elementos HTML visíveis
        function renderHistory(history) {
            const listElement = document.getElementById('historyList'); // 🎯 Captura a tag <ul> da lista
            listElement.innerHTML = ''; // 🧼 Limpa tudo o que estiver escrito dentro dela antes de redesenhar

            // 📭 Validação: Caso não tenha nenhum registro no histórico do navegador
            if (history.length === 0) {
                // ✍️ Escreve uma mensagem de lista vazia de forma estilizada
                listElement.innerHTML = '<li style="font-style: italic; opacity: 0.6;">vazio...</li>';
                return; // 🛑 Para a execução aqui já que não há itens para rodar no loop
            }

            // 🔄 Loop (repetição) forEach: roda uma vez para cada registro que estiver dentro do histórico
            history.forEach(item => {
                const li = document.createElement('li'); // 🛠️ Cria uma nova tag <li> dinamicamente na memória
                li.className = 'history-item'; // 🏷️ Adiciona a classe CSS correspondente para aplicar o design
                // ✍️ Preenche a linha com a data, o número do IMC e a classificação dentro de tags span
                li.innerHTML = `<span>${item.date} - imc: ${item.imc}</span> <span>[${item.status}]</span>`;
                listElement.appendChild(li); // 📌 Fixa a linha criada de fato dentro da nossa lista <ul> no HTML
            });
        }

        // 🗑️ Função acionada pelo botão de apagar os registros salvos
        function clearHistory() {
            localStorage.removeItem('brat_imc_history'); // 🧼 Deleta a chave de dados de histórico do armazenamento local
            renderHistory([]); // 🔄 Atualiza a tela passando uma lista vazia para sumir com os dados antigos
            document.getElementById('resultBox').style.display = 'none'; // 🕶️ Esconde a caixa de resultado atual para limpar o app
        }
    </script>
</body>

</html>
